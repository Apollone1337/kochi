<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | KOCHI•ART</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2A2F2B;
            --card-bg: #343A35;
            --text-main: #EAE7E2;
            --gold: #B0935B;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .admin-container {
            background: var(--card-bg);
            padding: 40px;
            border-top: 2px solid var(--gold);
            width: 100%;
            max-width: 800px;
            border-radius: 4px;
        }
        h1, h2 { color: var(--gold); font-weight: 400;}
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #949995; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; background: var(--bg-color);
            border: 1px solid rgba(255,255,255,0.1); color: white;
            border-radius: 4px; box-sizing: border-box;
        }
        button {
            background: var(--gold); color: var(--bg-color); border: none;
            padding: 12px 24px; font-weight: 600; cursor: pointer;
            border-radius: 2px; transition: 0.3s; width: auto; display: inline-block;
        }
        button:hover { background: #d4b578; }
        button:disabled { background: #555; cursor: not-allowed; }
        .hidden { display: none !important; }
        .image-preview {
            display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;
        }
        .image-preview img {
            width: 120px; height: 80px; object-fit: cover;
            border: 1px solid var(--gold); border-radius: 2px;
        }
        .loader {
            font-size: 12px; color: var(--gold); margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- СЕКЦИЯ ЛОГИНА -->
    <div class="login-container" id="login-section">
        <h1>Вход в систему</h1>
        <div class="form-group">
            <label>Email админа</label>
            <input type="text" id="email" placeholder="admin@domain.com">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="login-btn" style="width: 100%;">Войти</button>
    </div>

    <!-- СЕКЦИЯ УПРАВЛЕНИЯ КОНТЕНТОМ -->
    <div class="hidden dashboard-layout" id="dashboard-section">
        
        <aside class="sidebar">
            <div class="admin-logo">KOCHI•ART Admin</div>
            <nav>
                <button class="tab-btn active" data-tab="tab-hero">Главный экран</button>
                <button class="tab-btn" data-tab="tab-s1">Слайдер 1: Проектирование</button>
                <button class="tab-btn" data-tab="tab-s2">Слайдер 2: Благоустройство</button>
                <button class="tab-btn" data-tab="tab-s3">Слайдер 3: Уход</button>
                <button class="tab-btn" data-tab="tab-care">Блок: Служба заботы</button>
                <button class="tab-btn" data-tab="tab-coop">Блок: Сотрудничество</button>
                <button class="tab-btn" data-tab="tab-partners">Блок: Партнеры</button>
                <button class="tab-btn" data-tab="tab-contacts">Контакты и Подвал</button>
            </nav>
            <button id="logout-btn" class="logout-btn">Выйти из системы</button>
        </aside>

        <main class="content-area">
            
            <!-- ВКЛАДКА: ГЛАВНЫЙ ЭКРАН -->
            <div id="tab-hero" class="tab-content active">
                <h2>Главный экран (Шапка сайта)</h2>
                <div class="form-group">
                    <label>Название проекта</label>
                    <input type="text" id="hero-title" placeholder="高知 KOCHI•ART">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <input type="text" id="hero-desc" placeholder="прогрессивные ландшафты">
                </div>
                <div class="form-group">
                    <label>Слоган</label>
                    <input type="text" id="hero-slogan" placeholder="«Вид из окна меняет сознание»">
                </div>
                <button class="action-btn" onclick="saveTabData(this, ['hero-title', 'hero-desc', 'hero-slogan'])">Сохранить настройки</button>
            </div>

            <!-- ВКЛАДКА: СЛАЙДЕР 1 -->
            <div id="tab-s1" class="tab-content">
                <h2>Блок: Проектирование</h2>
                <div class="form-group">
                    <label>Заголовок блока (используйте Enter для переноса строк)</label>
                    <textarea id="title-s1" rows="3"></textarea>
                    <button class="action-btn" onclick="saveTabData(this, ['title-s1'])" style="margin-top: 10px;">Сохранить текст</button>
                </div>
                <hr>
                <div class="form-group">
                    <label>Фотографии для этой карусели</label>
                    <input type="file" id="file-s1" multiple accept="image/*">
                    <button class="upload-img-btn" data-input="file-s1" data-slider="carousel1" style="margin-top: 15px;">Загрузить фото</button>
                    <p style="margin-top: 20px; margin-bottom: 5px; font-size: 14px;">Текущие фото:</p>
                    <div class="image-preview" id="preview-s1"></div>
                </div>
            </div>

            <!-- ВКЛАДКА: СЛАЙДЕР 2 -->
            <div id="tab-s2" class="tab-content">
                <h2>Блок: Благоустройство</h2>
                <div class="form-group">
                    <label>Заголовок блока</label>
                    <textarea id="title-s2" rows="2"></textarea>
                    <button class="action-btn" onclick="saveTabData(this, ['title-s2'])" style="margin-top: 10px;">Сохранить текст</button>
                </div>
                <hr>
                <div class="form-group">
                    <label>Фотографии для этой карусели</label>
                    <input type="file" id="file-s2" multiple accept="image/*">
                    <button class="upload-img-btn" data-input="file-s2" data-slider="carousel2" style="margin-top: 15px;">Загрузить фото</button>
                    <p style="margin-top: 20px; margin-bottom: 5px; font-size: 14px;">Текущие фото:</p>
                    <div class="image-preview" id="preview-s2"></div>
                </div>
            </div>

            <!-- ВКЛАДКА: СЛАЙДЕР 3 -->
            <div id="tab-s3" class="tab-content">
                <h2>Блок: Уход</h2>
                <div class="form-group">
                    <label>Заголовок блока</label>
                    <textarea id="title-s3" rows="2"></textarea>
                    <button class="action-btn" onclick="saveTabData(this, ['title-s3'])" style="margin-top: 10px;">Сохранить текст</button>
                </div>
                <hr>
                <div class="form-group">
                    <label>Фотографии для этой карусели</label>
                    <input type="file" id="file-s3" multiple accept="image/*">
                    <button class="upload-img-btn" data-input="file-s3" data-slider="carousel3" style="margin-top: 15px;">Загрузить фото</button>
                    <p style="margin-top: 20px; margin-bottom: 5px; font-size: 14px;">Текущие фото:</p>
                    <div class="image-preview" id="preview-s3"></div>
                </div>
            </div>

            <!-- ВКЛАДКА: СЛУЖБА ЗАБОТЫ -->
            <div id="tab-care" class="tab-content">
                <h2>Служба заботы</h2>
                <div class="form-group">
                    <label>Заголовок блока</label>
                    <input type="text" id="care-title">
                    <hr style="margin: 20px 0;">
                    <label>Пункт 1</label><input type="text" id="care-f1">
                    <label>Пункт 2</label><input type="text" id="care-f2">
                    <label>Пункт 3</label><input type="text" id="care-f3">
                    <hr style="margin: 20px 0;">
                    <label>Текст перед кнопкой (используйте Enter для переноса)</label><textarea id="care-cta" rows="2"></textarea>
                    <label>Ссылка на кнопку (например, Telegram)</label><input type="text" id="care-link">
                </div>
                <button class="action-btn" onclick="saveTabData(this, ['care-title', 'care-f1', 'care-f2', 'care-f3', 'care-cta', 'care-link'])">Сохранить блок</button>
            </div>

            <!-- ВКЛАДКА: ПОРЯДОК СОТРУДНИЧЕСТВА -->
            <div id="tab-coop" class="tab-content">
                <h2>Порядок сотрудничества</h2>
                <div class="form-group"><label>Заголовок блока</label><input type="text" id="coop-title"></div>
                <div class="grid-2">
                    <div class="card-box"><label>Шаг 1: Название</label><input type="text" id="coop1-n"><label>Шаг 1: Описание</label><textarea id="coop1-d" rows="2"></textarea></div>
                    <div class="card-box"><label>Шаг 2: Название</label><input type="text" id="coop2-n"><label>Шаг 2: Описание</label><textarea id="coop2-d" rows="2"></textarea></div>
                    <div class="card-box"><label>Шаг 3: Название</label><input type="text" id="coop3-n"><label>Шаг 3: Описание</label><textarea id="coop3-d" rows="2"></textarea></div>
                    <div class="card-box"><label>Шаг 4: Название</label><input type="text" id="coop4-n"><label>Шаг 4: Описание</label><textarea id="coop4-d" rows="2"></textarea></div>
                    <div class="card-box"><label>Шаг 5: Название</label><input type="text" id="coop5-n"><label>Шаг 5: Описание</label><textarea id="coop5-d" rows="2"></textarea></div>
                    <div class="card-box"><label>Шаг 6: Название</label><input type="text" id="coop6-n"><label>Шаг 6: Описание</label><textarea id="coop6-d" rows="2"></textarea></div>
                </div>
                <button class="action-btn" onclick="saveTabData(this, ['coop-title', 'coop1-n', 'coop1-d', 'coop2-n', 'coop2-d', 'coop3-n', 'coop3-d', 'coop4-n', 'coop4-d', 'coop5-n', 'coop5-d', 'coop6-n', 'coop6-d'])">Сохранить блок</button>
            </div>

            <!-- ВКЛАДКА: ПАРТНЕРЫ -->
            <div id="tab-partners" class="tab-content">
                <h2>Наши партнеры</h2>
                <div class="form-group"><label>Заголовок блока</label><input type="text" id="part-title"></div>
                <div class="grid-2">
                    <div class="card-box"><label>Партнер 1: Имя</label><input type="text" id="p1-n"><label>Партнер 1: Описание</label><textarea id="p1-d" rows="2"></textarea></div>
                    <div class="card-box"><label>Партнер 2: Имя</label><input type="text" id="p2-n"><label>Партнер 2: Описание</label><textarea id="p2-d" rows="2"></textarea></div>
                    <div class="card-box"><label>Партнер 3: Имя</label><input type="text" id="p3-n"><label>Партнер 3: Описание</label><textarea id="p3-d" rows="2"></textarea></div>
                    <div class="card-box"><label>Партнер 4: Имя</label><input type="text" id="p4-n"><label>Партнер 4: Описание</label><textarea id="p4-d" rows="2"></textarea></div>
                    <div class="card-box"><label>Партнер 5: Имя</label><input type="text" id="p5-n"><label>Партнер 5: Описание</label><textarea id="p5-d" rows="2"></textarea></div>
                    <div class="card-box"><label>Партнер 6: Имя</label><input type="text" id="p6-n"><label>Партнер 6: Описание</label><textarea id="p6-d" rows="2"></textarea></div>
                </div>
                <button class="action-btn" onclick="saveTabData(this, ['part-title', 'p1-n', 'p1-d', 'p2-n', 'p2-d', 'p3-n', 'p3-d', 'p4-n', 'p4-d', 'p5-n', 'p5-d', 'p6-n', 'p6-d'])">Сохранить блок</button>
            </div>

            <!-- ВКЛАДКА: КОНТАКТЫ -->
            <div id="tab-contacts" class="tab-content">
                <h2>Контакты и Подвал</h2>
                <div class="form-group">
                    <label>Заголовок блока вопросов</label><input type="text" id="contact-title">
                    <label>Описание</label><input type="text" id="contact-desc">
                    <hr style="margin: 20px 0;">
                    <label>Ссылка Telegram</label><input type="text" id="tg-link">
                    <label>Ссылка WhatsApp (формат: https://wa.me/7...)</label><input type="text" id="wa-link">
                    <label>Ссылка на телефон (формат: tel:+7...)</label><input type="text" id="phone-link">
                    <hr style="margin: 20px 0;">
                    <label>Локация в подвале (Footer)</label><input type="text" id="location-text">
                </div>
                <button class="action-btn" onclick="saveTabData(this, ['contact-title', 'contact-desc', 'tg-link', 'wa-link', 'phone-link', 'location-text'])">Сохранить блок</button>
            </div>

        </main>
    </div>

    <script type="module">
        // Подключение модулей Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- ВСТАВЬ СВОЙ FIREBASE CONFIG СЮДА ---
        const firebaseConfig = {
        apiKey: "AIzaSyBBUJaS5O2-w-IiRx6ViQhjwE4ZxyHqDXY",
        authDomain: "kochi-art-web.firebaseapp.com",
        projectId: "kochi-art-web",
        storageBucket: "kochi-art-web.firebasestorage.app",
        messagingSenderId: "136666014395",
         appId: "1:136666014395:web:f30ea60b93405df8563f9e",
        measurementId: "G-C6QZ6PLXWJ"
        };
        // ----------------------------------------

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                loadAllData();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
            }
        });

        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Ошибка: " + err.message));
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                e.currentTarget.classList.add('active');
                document.getElementById(e.currentTarget.dataset.tab).classList.add('active');
            });
        });

        async function loadAllData() {
            try {
                const mainSnap = await getDoc(doc(db, "content", "main"));
                const d = mainSnap.exists() ? mainSnap.data() : {};
                
                const setV = (id, def) => { const el = document.getElementById(id); if(el) el.value = d[id] || def; };

                // Общие настройки
                setV('hero-title', '高知 KOCHI•ART');
                setV('hero-desc', 'прогрессивные ландшафты');
                setV('hero-slogan', '«Вид из окна меняет сознание»');
                setV('title-s1', 'ПРОЕКТИРОВАНИЕ\nЧАСТНЫХ И ОБЩЕСТВЕННЫХ\nПРОСТРАНСТВ');
                setV('title-s2', 'БЛАГОУСТРОЙСТВО');
                setV('title-s3', 'УХОД');

                // Служба заботы
                setV('care-title', 'СЛУЖБА ЗАБОТЫ');
                setV('care-f1', 'мы всегда на связи: консультации, рекомендации');
                setV('care-f2', 'срочные выезды');
                setV('care-f3', 'приоритетное обслуживание садов постоянных клиентов');
                setV('care-cta', 'Получите консультацию по\nвашему саду уже сейчас');
                setV('care-link', 'https://t.me/k_irina_dd');

                // Сотрудничество
                setV('coop-title', 'ПОРЯДОК СОТРУДНИЧЕСТВА');
                setV('coop1-n', 'Бриф'); setV('coop1-d', 'Задачи, пожелания клиентов');
                setV('coop2-n', 'Анализ объекта'); setV('coop2-d', 'Оценка потенциальной возможности благоустройства');
                setV('coop3-n', 'Концепция'); setV('coop3-d', 'Пространственно-планировочное предложение в планах, схемах, визуализациях');
                setV('coop4-n', 'Укрупненная смета'); setV('coop4-d', 'Примерный расчет материалов');
                setV('coop5-n', 'Вынос проекта в натуру'); setV('coop5-d', 'Выбор подрядчиков и поставщиков. Детальная смета');
                setV('coop6-n', 'Благоустройство'); setV('coop6-d', 'Планирование грунта, посадка растений, монтаж бордюров, отсыпка инертными материалами, укладка газона');

                // Партнеры
                setV('part-title', 'НАШИ ПАРТНЁРЫ');
                setV('p1-n', 'ORGANICA'); setV('p1-d', 'Автоматические системы полива');
                setV('p2-n', 'Садовый центр Веры Глуховой'); setV('p2-d', 'Посадочный материал');
                setV('p3-n', 'Садовый центр Дизайн Флора'); setV('p3-d', 'Посадочный материал');
                setV('p4-n', 'Садовый центр Флора ДД'); setV('p4-d', 'Посадочный материал');
                setV('p5-n', 'МореКам'); setV('p5-d', 'Натуральный камень');
                setV('p6-n', 'SVETHOLL'); setV('p6-d', 'Интерьерное и экстерьерное освещение');

                // Контакты
                setV('contact-title', 'ЕСТЬ ВОПРОСЫ?!');
                setV('contact-desc', 'Мы всегда на связи и готовы обсудить ваш будущий сад');
                setV('tg-link', 'https://t.me/k_irina_dd');
                setV('wa-link', 'https://wa.me/79176158055');
                setV('phone-link', 'tel:+79176158055');
                setV('location-text', 'Ульяновская область');

                const sliderSnap = await getDoc(doc(db, "content", "sliders"));
                const s = sliderSnap.exists() ? sliderSnap.data() : {};
                
                renderPreview('preview-s1', s.carousel1);
                renderPreview('preview-s2', s.carousel2);
                renderPreview('preview-s3', s.carousel3);
            } catch (err) {
                console.error(err);
                if(err.code === 'permission-denied') {
                    alert("ВНИМАНИЕ: Ошибка прав доступа к БД (Firebase). Пожалуйста, обновите правила Firestore!");
                }
            }
        }

        function renderPreview(containerId, urlsArray) {
            const container = document.getElementById(containerId);
            if (urlsArray && urlsArray.length > 0) {
                container.innerHTML = urlsArray.map(url => `<img src="${url}">`).join('');
            } else {
                container.innerHTML = '<span class="loader">Нет загруженных фото</span>';
            }
        }

        // Универсальная функция сохранения любых текстов
        window.saveTabData = async function(btn, ids) {
            const originalText = btn.textContent;
            btn.textContent = "Сохраняем...";
            btn.disabled = true;
            let dataToSave = {};
            ids.forEach(id => {
                const el = document.getElementById(id);
                if(el) dataToSave[id] = el.value;
            });
            try {
                await setDoc(doc(db, "content", "main"), dataToSave, { merge: true });
                alert("Успешно сохранено!");
            } catch (error) {
                alert("Ошибка сохранения: " + error.message);
            }
            btn.textContent = originalText;
            btn.disabled = false;
        };

        document.querySelectorAll('.upload-img-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const inputId = e.currentTarget.dataset.input;
                const sliderKey = e.currentTarget.dataset.slider;
                const fileInput = document.getElementById(inputId);
                const files = fileInput.files;
                if (files.length === 0) return alert("Пожалуйста, выберите файлы для загрузки.");
                
                const originalText = e.currentTarget.textContent;
                e.currentTarget.textContent = "Загружаем...";
                e.currentTarget.disabled = true;
                
                try {
                    // Получаем секретный ключ ImgBB из защищенной коллекции базы данных
                    const keySnap = await getDoc(doc(db, "settings", "secrets"));
                    if (!keySnap.exists() || !keySnap.data().imgbb) {
                        throw new Error("API ключ ImgBB не найден в базе данных Firebase!");
                    }
                    const imgbbApiKey = keySnap.data().imgbb;

                    const urls = [];
                    for (let file of files) {
                        const formData = new FormData();
                        formData.append('image', file);
                        const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbApiKey}`, { method: 'POST', body: formData });
                        const data = await response.json();
                        if (data.success) urls.push(data.data.url);
                        else throw new Error("Ошибка загрузки");
                    }
                    await setDoc(doc(db, "content", "sliders"), { [sliderKey]: urls }, { merge: true });
                    alert("Фотографии успешно обновлены!");
                    fileInput.value = '';
                    loadAllData();
                } catch (err) { alert("Ошибка: " + err.message); }
                e.currentTarget.textContent = originalText;
                e.currentTarget.disabled = false;
            });
        });
    </script>
</body>
</html>
